<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-labelledby="title desc">
  <title id="title">La HuQQa logo</title>
  <desc id="desc">Logo La HuQQa en or avec texte stylisé</desc>
  <defs>
    <linearGradient id="gold-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7d05d" />
      <stop offset="45%" stop-color="#d7aa24" />
      <stop offset="100%" stop-color="#b7871d" />
    </linearGradient>
    <filter id="logo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.18" />
    </filter>
  </defs>
  <rect width="600" height="320" fill="none" />
  <text x="50%" y="22%" text-anchor="middle" font-family="Georgia, serif" font-size="52" letter-spacing="10" fill="url(#gold-gradient)" opacity="0.95">LA</text>
  <text x="50%" y="58%" text-anchor="middle" font-family="Georgia, serif" font-size="168" font-weight="800" letter-spacing="2" fill="url(#gold-gradient)" filter="url(#logo-shadow)">huQQa</text>
  <text x="50%" y="92%" text-anchor="middle" font-family="Georgia, serif" font-size="28" letter-spacing="6" fill="url(#gold-gradient)">RESTO‑CAFÉ</text>
</svg>
